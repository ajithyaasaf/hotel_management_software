name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git Configuration
        run: |
          git config --global user.email "deploy-action@github.com"
          git config --global user.name "GitHub Deploy Action"

      - name: Prepare Clean Build Directory
        run: |
          mkdir dist-deploy
          # Copy the contents of the server folder directly into the deployment root
          cp -r server/* dist-deploy/
          # Ensure README metadata exists at the root of the deployment
          cp server/README.md dist-deploy/ 2>/dev/null || cp README.md dist-deploy/ 2>/dev/null

      - name: Force Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: 'godivatech'
          HF_SPACE_NAME: 'godiva-rooms-backend'
        run: |
          cd dist-deploy
          git init
          git checkout -b main
          git add .
          git commit -m "Auto-deploy from GitHub Actions: $GITHUB_SHA"
          git remote add huggingface "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME"
          git push huggingface main --force
